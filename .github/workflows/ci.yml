name: CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential libfuse-dev

    - name: Build project
      run: make

    - name: Make test script executable
      run: chmod +x tests/test.sh

    - name: Run tests
      run: ./tests/test.sh
